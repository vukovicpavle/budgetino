name: '🐛 Bug Report'
description: 'Report a bug in Budgetino'
title: 'fix: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: 'A clear and concise description of the bug.'
      placeholder: "When I try to add a new expense, the form submits but the expense doesn't appear in the list."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: 'Step-by-step instructions to reproduce the bug.'
      placeholder: |
        1. Navigate to Budget > Expenses
        2. Click "Add Expense"
        3. Fill in amount: 50, category: "Food"
        4. Click "Save"
        5. Observe: expense is not shown in the list
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: 'What should have happened?'
      placeholder: 'The expense should appear in the expense list with the correct amount and category.'
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: 'What actually happened? Include error messages, screenshots, or logs.'
      placeholder: "The form closes but the expense list remains empty. Console shows: 'TypeError: Cannot read property id of undefined'"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: 'Where does this bug occur?'
      multiple: true
      options:
        - 'Web (Next.js)'
        - 'iOS (Expo)'
        - 'Android (Expo)'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version / Commit SHA
      description: 'Which version or commit are you running?'
      placeholder: 'v0.1.0 or abc1234'
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: 'Browser, OS, device details.'
      placeholder: |
        - Browser: Chrome 120
        - OS: macOS 14.2
        - Device: iPhone 15 Pro (Simulator)
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 'Critical (app crash, data loss)'
        - 'High (feature broken, no workaround)'
        - 'Medium (feature broken, workaround exists)'
        - 'Low (cosmetic, minor inconvenience)'
    validations:
      required: true

  - type: textarea
    id: possible-fix
    attributes:
      label: Possible Fix
      description: 'If you have an idea of what might be causing this, share it here.'
      placeholder: "The issue might be in `use-expenses.ts` where the mutation doesn't invalidate the query cache."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: 'Attach screenshots, screen recordings, or console logs.'
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: 'What must be true for this bug to be considered fixed?'
      placeholder: |
        - [ ] Expense appears in the list after form submission
        - [ ] No console errors during the flow
        - [ ] Works on both web and mobile
    validations:
      required: true

  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      value: |
        - [ ] Root cause identified and documented in the PR
        - [ ] Fix implemented following [Code Style Guide](../../docs/CONTRIBUTING.md)
        - [ ] Regression test added (Vitest or Playwright/Maestro)
        - [ ] All user-facing strings use translation keys (`t()`)
        - [ ] No TypeScript errors
        - [ ] CI/CD passes
        - [ ] Tested on affected platform(s)
        - [ ] PR follows conventional commits
    validations:
      required: true
