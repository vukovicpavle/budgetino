name: Copilot PR Review Loop

# Drives every PR toward a mergeable state by automating the Copilot review
# loop. On each push the workflow requests a Copilot review; on each submitted
# review it checks for unresolved threads and instructs Copilot to address
# them. Once all threads are resolved and every CI check is green the workflow
# posts a "Ready to merge" comment. A stall guard fires after five consecutive
# runs with identical unresolved threads and no new push.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

# GITHUB_TOKEN needs write access to pull-requests so it can post comments,
# request reviewers, and apply labels. Contents read is required for commit
# data access, while checks/statuses read is required for querying CI state
# via the Check Runs and Commit Statuses APIs. If assigning the Copilot
# reviewer requires a PAT, set the COPILOT_REVIEW_TOKEN repository secret
# and the request-review step will use it automatically.
permissions:
  pull-requests: write
  contents: read
  issues: write
  checks: read
  statuses: read

# Prevent parallel runs on the same PR so stall-counter updates are
# serialised. Runs are queued, not cancelled.
concurrency:
  group: copilot-pr-loop-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  copilot-review-loop:
    runs-on: ubuntu-latest
    # Skip the job entirely for fork PRs: the GITHUB_TOKEN is read-only and
    # secrets are unavailable for forks, so all write operations would fail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      # ------------------------------------------------------------------ #
      # 1. REQUEST COPILOT REVIEW (on every push / synchronize event)       #
      # ------------------------------------------------------------------ #
      - name: Request Copilot review
        if: github.event_name == 'pull_request'
        # Prefer the PAT stored in COPILOT_REVIEW_TOKEN when set, as it has
        # the required scope for requesting the Copilot reviewer. Falls back
        # to GITHUB_TOKEN when the secret is not configured.
        # POST to the requested_reviewers endpoint directly so a fresh
        # re-review request is created even when Copilot has already reviewed
        # a previous commit (gh pr edit --add-reviewer is a no-op in that
        # case). Falls back to gh pr edit if the REST call fails.
        env:
          GH_TOKEN: ${{ secrets.COPILOT_REVIEW_TOKEN || github.token }}
        run: |
          echo '{"reviewers":["copilot-pull-request-reviewer"]}' | \
            gh api --method POST \
              "repos/${{ github.repository }}/pulls/$PR_NUMBER/requested_reviewers" \
              --input - || \
          gh pr edit "$PR_NUMBER" \
            --add-reviewer copilot-pull-request-reviewer \
            --repo "${{ github.repository }}" || true

      # ------------------------------------------------------------------ #
      # 2. FETCH UNRESOLVED, NON-OUTDATED REVIEW THREADS                   #
      # ------------------------------------------------------------------ #
      - name: Fetch unresolved review threads
        id: threads
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          ALL_THREADS='[]'
          CURSOR=""

          while :; do
            # Pass cursor=null for the first page; GitHub GraphQL rejects after: ""
            if [ -z "$CURSOR" ]; then
              RESULT=$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $pr) {
                        reviewThreads(first: 100, after: $cursor) {
                          nodes {
                            id
                            isResolved
                            isOutdated
                          }
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                        }
                      }
                    }
                  }
                ' \
                -f owner="$OWNER" \
                -f repo="$REPO" \
                -F pr="$PR_NUMBER" \
                -F cursor=null)
            else
              RESULT=$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $pr) {
                        reviewThreads(first: 100, after: $cursor) {
                          nodes {
                            id
                            isResolved
                            isOutdated
                          }
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                        }
                      }
                    }
                  }
                ' \
                -f owner="$OWNER" \
                -f repo="$REPO" \
                -F pr="$PR_NUMBER" \
                -f cursor="$CURSOR")
            fi

            PAGE_THREADS=$(echo "$RESULT" | jq '.data.repository.pullRequest.reviewThreads.nodes')
            ALL_THREADS=$(jq -cn \
              --argjson existing "$ALL_THREADS" \
              --argjson page "$PAGE_THREADS" \
              '$existing + $page')

            HAS_NEXT_PAGE=$(echo "$RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            if [ "$HAS_NEXT_PAGE" != "true" ]; then
              break
            fi

            CURSOR=$(echo "$RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
          done

          URLS=$(echo "$ALL_THREADS" | jq -r '
            [.[]
              | select(.isResolved == false and .isOutdated == false)
              | .id]
            | sort | .[]')

          if [ -z "$URLS" ]; then
            COUNT=0
            HASH="empty"
          else
            COUNT=$(echo "$URLS" | wc -l)
            HASH=$(printf '%s' "$URLS" | sha256sum | cut -d' ' -f1)
          fi

          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          {
            echo "urls<<EOF"
            echo "$URLS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------ #
      # 3. INSTRUCT COPILOT TO ADDRESS UNRESOLVED THREADS                  #
      #    (only on pull_request_review events when threads exist)          #
      # ------------------------------------------------------------------ #
      - name: Post Copilot assignment comment
        if: |
          github.event_name == 'pull_request_review' &&
          steps.threads.outputs.count != '0'
        # Must use a PAT from a real user account — @copilot mentions posted
        # by github-actions[bot] are ignored by the Copilot reviewer.
        # Store the PAT as COPILOT_REVIEW_TOKEN to enable this.
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_REVIEW_TOKEN }}
        run: |
          if [ -n "$COPILOT_TOKEN" ]; then
            COMMENT_TOKEN="$COPILOT_TOKEN"
          else
            echo "::warning::COPILOT_REVIEW_TOKEN is not set. The @copilot mention will be posted by github-actions[bot] and may not trigger the Copilot reviewer. Set a PAT with repo scope as COPILOT_REVIEW_TOKEN to fix this."
            COMMENT_TOKEN="$GH_TOKEN"
          fi
          GH_TOKEN="$COMMENT_TOKEN" gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "@copilot please address each of the suggestions above and push the changes to this branch before merging."

      # ------------------------------------------------------------------ #
      # 4. STALL DETECTION                                                  #
      #    State is persisted in a hidden tracking comment on the PR.       #
      # ------------------------------------------------------------------ #
      - name: Fetch stall-tracking comment
        id: stall_fetch
        run: |
          DATA=$(gh api --paginate \
            "repos/${{ github.repository }}/issues/$PR_NUMBER/comments?per_page=100" \
            | jq -s 'add | [.[] | select(.body | startswith("<!-- copilot-pr-loop-stall -->"))] | last')

          COMMENT_ID=$(echo "$DATA" | jq -r '.id // empty')
          BODY=$(echo "$DATA" | jq -r '.body // ""')

          PREV_HASH=$(printf '%s\n' "$BODY" | sed -n 's/^hash://p')
          PREV_COUNT=$(printf '%s\n' "$BODY" | sed -n 's/^count://p')
          PREV_SHA=$(printf '%s\n' "$BODY" | sed -n 's/^sha://p')

          echo "comment_id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "prev_hash=${PREV_HASH}" >> "$GITHUB_OUTPUT"
          echo "prev_count=${PREV_COUNT:-0}" >> "$GITHUB_OUTPUT"
          echo "prev_sha=${PREV_SHA}" >> "$GITHUB_OUTPUT"

      - name: Compute stall count
        id: stall
        run: |
          CURRENT_HASH="${{ steps.threads.outputs.hash }}"
          CURRENT_COUNT="${{ steps.threads.outputs.count }}"
          PREV_HASH="${{ steps.stall_fetch.outputs.prev_hash }}"
          PREV_COUNT="${{ steps.stall_fetch.outputs.prev_count }}"
          PREV_SHA="${{ steps.stall_fetch.outputs.prev_sha }}"

          if [ "$CURRENT_COUNT" = "0" ]; then
            # All threads resolved — reset the counter
            NEW_COUNT=0
          elif [ "$CURRENT_HASH" = "$PREV_HASH" ] && [ "$HEAD_SHA" = "$PREV_SHA" ]; then
            # Same unresolved threads, same HEAD (no new push) — increment
            NEW_COUNT=$(( PREV_COUNT > 0 ? PREV_COUNT + 1 : 1 ))
          else
            # Either new threads or a new push — reset
            NEW_COUNT=0
          fi

          echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$NEW_COUNT" -ge 5 ]; then
            echo "is_stalled=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stalled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update stall-tracking comment
        run: |
          BODY=$(printf '<!-- copilot-pr-loop-stall -->\nhash:%s\ncount:%s\nsha:%s' \
            "${{ steps.threads.outputs.hash }}" \
            "${{ steps.stall.outputs.new_count }}" \
            "$HEAD_SHA")

          COMMENT_ID="${{ steps.stall_fetch.outputs.comment_id }}"

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -X PATCH \
              -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          fi

      - name: Apply stalled label and request human intervention
        if: steps.stall.outputs.is_stalled == 'true'
        run: |
          gh pr edit "$PR_NUMBER" \
            --add-label stalled \
            --repo "${{ github.repository }}" || true
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "⚠️ This PR appears to be stalled — the same unresolved review threads have persisted across 5 consecutive workflow runs with no new push. Human intervention is required to resolve the remaining threads and unblock this PR."

      # ------------------------------------------------------------------ #
      # 5. READY-TO-MERGE CHECK                                             #
      #    Runs only when there are no unresolved threads.                  #
      # ------------------------------------------------------------------ #
      - name: Check if ready to merge
        id: ready_check
        if: steps.threads.outputs.count == '0'
        run: |
          STATUS_INFO=$(gh api \
            "repos/${{ github.repository }}/commits/$HEAD_SHA/status" \
            --jq '{state: .state, total: .total_count}')

          STATUS_STATE=$(echo "$STATUS_INFO" | jq -r '.state')
          STATUS_TOTAL=$(echo "$STATUS_INFO" | jq -r '.total')

          # Exclude this workflow's own check-run from the count to avoid a
          # false-negative while the current run is still in progress.
          # GitHub Actions check-runs are named after the job id, so exclude
          # by ${{ github.job }} and keep the workflow-name exclusion as a
          # defensive fallback. Fetch all pages to avoid missing checks.
          BLOCKING_CHECKS=$(gh api --paginate \
            "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs?per_page=100" \
            | jq -s '[.[].check_runs[]
              | select(
                  .name != "${{ github.job }}" and
                  .name != "Copilot PR Review Loop" and (
                    .status != "completed" or (
                      .conclusion != "success" and
                      .conclusion != "skipped" and
                      .conclusion != "neutral"
                    )
                  )
                )
              ] | length')

          # Ready when: legacy status checks all pass (or none exist) AND
          # there are no blocking GitHub Actions check runs.
          if [ "$STATUS_TOTAL" = "0" ] || [ "$STATUS_STATE" = "success" ]; then
            STATUS_OK=true
          else
            STATUS_OK=false
          fi

          if [ "$STATUS_OK" = "true" ] && [ "$BLOCKING_CHECKS" = "0" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post ready-to-merge comment
        if: steps.ready_check.outputs.ready == 'true'
        run: |
          READY_MARKER="<!-- copilot-pr-loop:ready-to-merge -->"
          READY_BODY=$(cat <<EOF
${READY_MARKER}
✅ Ready to merge — all review threads are resolved and all checks have passed.
EOF
          )

          # Avoid posting duplicate comments by upserting an existing marker.
          EXISTING_COMMENT_ID=$(gh api --paginate \
            "repos/${{ github.repository }}/issues/$PR_NUMBER/comments?per_page=100" \
            | jq -rs '[.[].[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- copilot-pr-loop:ready-to-merge -->")))] | last | .id // empty')

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" \
              --field body="$READY_BODY"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$READY_BODY"
          fi
